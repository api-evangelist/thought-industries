naftiko: 1.0.0-alpha2
info:
  label: Thought Industries REST API — Groups
  description: 'Thought Industries REST API — Groups. 2 operations. Lead operation: List Groups. Self-contained Naftiko capability
    covering one Thought Industries business surface.'
  tags:
  - Thought Industries
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THOUGHT_INDUSTRIES_API_KEY: THOUGHT_INDUSTRIES_API_KEY
capability:
  consumes:
  - type: http
    namespace: thought-industries-groups
    baseUri: https://{subdomain}.thoughtindustries.com/incoming/api/v1
    description: Thought Industries REST API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: listgroups
        method: GET
        description: List Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: per_page
          in: query
          type: integer
    - name: groups-groupId-users
      path: /groups/{groupId}/users
      operations:
      - name: addusertogroup
        method: POST
        description: Add User to Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: groupId
          in: path
          type: string
          description: Group ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.THOUGHT_INDUSTRIES_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: thought-industries-groups-rest
    port: 8080
    description: REST adapter for Thought Industries REST API — Groups. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: GET
        name: listgroups
        description: List Groups
        call: thought-industries-groups.listgroups
        with:
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups/{groupid}/users
      name: groups-groupid-users
      description: REST surface for groups-groupId-users.
      operations:
      - method: POST
        name: addusertogroup
        description: Add User to Group
        call: thought-industries-groups.addusertogroup
        with:
          groupId: rest.groupId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thought-industries-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Thought Industries REST API — Groups. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-groups
      description: List Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thought-industries-groups.listgroups
      with:
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: add-user-group
      description: Add User to Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: thought-industries-groups.addusertogroup
      with:
        groupId: tools.groupId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
