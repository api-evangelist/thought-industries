naftiko: "1.0.0-alpha1"

info:
  label: "Thought Industries REST API"
  description: >-
    Thought Industries REST API v1 providing access to users, courses,
    enrollments, groups, content, categories, and reporting for the
    B2B learning platform.
  tags:
    - Education
    - Learning
    - LMS
    - Users
    - Courses
    - Enrollments
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      THOUGHT_INDUSTRIES_API_KEY: THOUGHT_INDUSTRIES_API_KEY

capability:
  consumes:
    - type: http
      namespace: thought-industries
      baseUri: https://{subdomain}.thoughtindustries.com/incoming/api/v1
      description: "Thought Industries REST API v1"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{THOUGHT_INDUSTRIES_API_KEY}}"
        placement: header
      resources:
        - name: users
          path: /users
          description: User lifecycle management
          operations:
            - name: list-users
              method: GET
              description: List all users with pagination
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: Records per page (max 100)
                - name: email
                  in: query
                  type: string
                  required: false
                  description: Filter by email address
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: Create a new user
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  first_name: "{{tools.first_name}}"
                  last_name: "{{tools.last_name}}"
                  active: "{{tools.active}}"
            - name: get-user
              method: GET
              description: Get a single user by ID
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: User ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-user
              method: PUT
              description: Update a user record
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: User ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  active: "{{tools.active}}"
                  first_name: "{{tools.first_name}}"
                  last_name: "{{tools.last_name}}"
        - name: courses
          path: /courses
          description: Course management
          operations:
            - name: list-courses
              method: GET
              description: List all courses
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: Records per page
                - name: status
                  in: query
                  type: string
                  required: false
                  description: Filter by status (published, draft, archived)
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-course
              method: GET
              description: Get a specific course
              inputParameters:
                - name: courseId
                  in: path
                  type: string
                  required: true
                  description: Course ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: enrollments
          path: /courses/{courseId}/enrollments
          description: Course enrollment management
          operations:
            - name: get-user-enrollments
              method: GET
              description: Get enrollments for a user
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: User ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: enroll-user
              method: POST
              description: Enroll a user in a course
              inputParameters:
                - name: courseId
                  in: path
                  type: string
                  required: true
                  description: Course ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  user_id: "{{tools.user_id}}"
            - name: bulk-remove-enrollments
              method: POST
              description: Bulk remove user access from a course
              inputParameters:
                - name: courseId
                  in: path
                  type: string
                  required: true
                  description: Course ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  user_ids: "{{tools.user_ids}}"
        - name: groups
          path: /groups
          description: User group management
          operations:
            - name: list-groups
              method: GET
              description: List all user groups
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-user-to-group
              method: POST
              description: Add a user to a group
              inputParameters:
                - name: groupId
                  in: path
                  type: string
                  required: true
                  description: Group ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  user_id: "{{tools.user_id}}"
        - name: reports
          path: /reports
          description: Analytics and reporting
          operations:
            - name: get-learning-path-actions-report
              method: GET
              description: Get learning path actions report
              inputParameters:
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: Report start date
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: Report end date
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: thought-industries-rest
      resources:
        - path: /v1/users
          name: users
          description: Users list
          operations:
            - method: GET
              name: list-users
              description: List all users
              call: "thought-industries.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-user
              description: Create a new user
              call: "thought-industries.create-user"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/courses
          name: courses
          description: Courses list
          operations:
            - method: GET
              name: list-courses
              description: List all courses
              call: "thought-industries.list-courses"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/enrollments
          name: enrollments
          description: Enrollments
          operations:
            - method: POST
              name: enroll-user
              description: Enroll a user in a course
              call: "thought-industries.enroll-user"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: thought-industries-mcp
      transport: http
      tools:
        - name: list-users
          description: List all users in the learning platform
          hints:
            readOnly: true
            openWorld: true
          call: "thought-industries.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: Create a new user account in the platform
          hints:
            readOnly: false
            destructive: false
          call: "thought-industries.create-user"
          with:
            email: "tools.email"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-courses
          description: List available courses in the platform
          hints:
            readOnly: true
            openWorld: true
          call: "thought-industries.list-courses"
          outputParameters:
            - type: object
              mapping: "$."
        - name: enroll-user
          description: Enroll a user in a course
          hints:
            readOnly: false
            destructive: false
          call: "thought-industries.enroll-user"
          with:
            courseId: "tools.courseId"
            user_id: "tools.user_id"
          outputParameters:
            - type: object
              mapping: "$."
