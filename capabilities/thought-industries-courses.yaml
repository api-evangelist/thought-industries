naftiko: 1.0.0-alpha2
info:
  label: Thought Industries REST API — Courses
  description: 'Thought Industries REST API — Courses. 2 operations. Lead operation: List Courses. Self-contained Naftiko
    capability covering one Thought Industries business surface.'
  tags:
  - Thought Industries
  - Courses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THOUGHT_INDUSTRIES_API_KEY: THOUGHT_INDUSTRIES_API_KEY
capability:
  consumes:
  - type: http
    namespace: thought-industries-courses
    baseUri: https://{subdomain}.thoughtindustries.com/incoming/api/v1
    description: Thought Industries REST API — Courses business capability. Self-contained, no shared references.
    resources:
    - name: courses
      path: /courses
      operations:
      - name: listcourses
        method: GET
        description: List Courses
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: per_page
          in: query
          type: integer
        - name: status
          in: query
          type: string
          description: Filter by course status.
    - name: courses-courseId
      path: /courses/{courseId}
      operations:
      - name: getcourse
        method: GET
        description: Get Course
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: courseId
          in: path
          type: string
          description: Course ID.
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.THOUGHT_INDUSTRIES_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: thought-industries-courses-rest
    port: 8080
    description: REST adapter for Thought Industries REST API — Courses. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/courses
      name: courses
      description: REST surface for courses.
      operations:
      - method: GET
        name: listcourses
        description: List Courses
        call: thought-industries-courses.listcourses
        with:
          page: rest.page
          per_page: rest.per_page
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/courses/{courseid}
      name: courses-courseid
      description: REST surface for courses-courseId.
      operations:
      - method: GET
        name: getcourse
        description: Get Course
        call: thought-industries-courses.getcourse
        with:
          courseId: rest.courseId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: thought-industries-courses-mcp
    port: 9090
    transport: http
    description: MCP adapter for Thought Industries REST API — Courses. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-courses
      description: List Courses
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thought-industries-courses.listcourses
      with:
        page: tools.page
        per_page: tools.per_page
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: get-course
      description: Get Course
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: thought-industries-courses.getcourse
      with:
        courseId: tools.courseId
      outputParameters:
      - type: object
        mapping: $.
